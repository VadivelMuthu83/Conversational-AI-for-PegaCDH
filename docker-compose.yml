version: "3.9"

services:
  backend:
    build: ./backend
    container_name: copilot-analyst-backend
    env_file: .env
    volumes:
      - ./sample-data:/data:ro       # mount sample data (read-only)
      - index_data:/index            # persist FAISS index
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: copilot-analyst-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  index_data:
